name: Compatibility Tests

on:
  schedule:
    - cron: '17 2 * * *'  # 2:17am UTC nightly
  workflow_dispatch:
  push:
    paths:
      - 'services/**'
      - 'pkg/gateway/**'
      - 'pkg/routing/**'

jobs:
  sdk-compat:
    name: SDK Compatibility (14 services)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOPRIVATE: github.com/neureaux/cloudmock
      GONOSUMCHECK: github.com/neureaux/cloudmock
      GOFLAGS: -mod=mod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ./.github/actions/cloudmock
        id: cloudmock

      - name: Run comprehensive SDK compat tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          mkdir -p /tmp/compat
          # The compat tests are in the repo under tests/compat/
          cp -r $GITHUB_WORKSPACE/tests/compat/* /tmp/compat/ 2>/dev/null || true

          # Run the tests if they exist
          if [ -f /tmp/compat/main_test.go ]; then
            cd /tmp/compat
            go test -v -tags integration -timeout 120s 2>&1 | tee /tmp/compat-results.txt
          fi

      - name: Run benchmark harness (all services)
        run: |
          go run ./benchmarks/cmd/bench \
            --target=cloudmock \
            --endpoint=http://localhost:4566 \
            --quick \
            --output=benchmarks/results/nightly

      - name: Generate compat report
        run: |
          go run ./benchmarks/compat/cmd/ \
            --input benchmarks/results/nightly/results.json \
            --output website/src/data/compat.json

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/src/data/compat.json benchmarks/results/nightly/ || true
          git diff --cached --quiet || git commit -m "compat: nightly $(date +%Y-%m-%d) [skip ci]"
          git push || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: compat-results-${{ github.run_id }}
          path: |
            website/src/data/compat.json
            benchmarks/results/nightly/
            /tmp/compat-results.txt

  terraform-compat:
    name: Terraform Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOPRIVATE: github.com/neureaux/cloudmock
      GONOSUMCHECK: github.com/neureaux/cloudmock
      GOFLAGS: -mod=mod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ./.github/actions/cloudmock

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12'

      - name: Test Terraform DynamoDB module
        working-directory: tests/terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Create a minimal Terraform test
          cat > main.tf << 'EOF'
          terraform {
            required_providers {
              aws = { source = "hashicorp/aws", version = "~> 5.0" }
            }
          }
          provider "aws" {
            access_key                  = "test"
            secret_key                  = "test"
            region                      = "us-east-1"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            s3_use_path_style           = true
            endpoints {
              dynamodb = "http://localhost:4566"
              s3       = "http://localhost:4566"
              sqs      = "http://localhost:4566"
              sns      = "http://localhost:4566"
              iam      = "http://localhost:4566"
              sts      = "http://localhost:4566"
            }
          }

          resource "aws_dynamodb_table" "test" {
            name         = "compat-test-table"
            billing_mode = "PAY_PER_REQUEST"
            hash_key     = "pk"
            attribute { name = "pk"; type = "S" }
          }

          resource "aws_sqs_queue" "test" {
            name = "compat-test-queue"
          }

          resource "aws_sns_topic" "test" {
            name = "compat-test-topic"
          }
          EOF

          terraform init -no-color
          terraform apply -auto-approve -no-color
          terraform destroy -auto-approve -no-color

  open-source-compat:
    name: Open Source Repos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOPRIVATE: github.com/neureaux/cloudmock
      GONOSUMCHECK: github.com/neureaux/cloudmock
      GOFLAGS: -mod=mod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: ./.github/actions/cloudmock

      - name: Test serverless-test-samples (Python)
        run: |
          git clone --depth 1 https://github.com/aws-samples/serverless-test-samples.git /tmp/serverless-tests
          cd /tmp/serverless-tests/python-test-samples/apigw-lambda-dynamodb
          pip install -q boto3 pytest
          AWS_ENDPOINT_URL=http://localhost:4566 \
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=us-east-1 \
          python -m pytest tests/unit/ -v --tb=short 2>&1 | tail -20

      - name: Test DynamoMQ (Go)
        run: |
          git clone --depth 1 https://github.com/vvatanabe/dynamomq.git /tmp/dynamomq
          cd /tmp/dynamomq
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_REGION=us-east-1 \
          DYNAMODB_ENDPOINT=http://localhost:4566 \
          go test -v -tags cloudmock -run TestCloudMock -timeout 60s ./... 2>&1 | tail -20 || true
