services:
  cloudmock:
    image: ghcr.io/viridian-inc/cloudmock:latest
    ports:
      - "4566:4566"
      - "4500:4500"
    environment:
      CLOUDMOCK_PROFILE: full
      CLOUDMOCK_IAM_MODE: none
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/"]
      interval: 5s
      retries: 10

  setup:
    image: amazon/aws-cli
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws dynamodb create-table --table-name notes
          --attribute-definitions AttributeName=id,AttributeType=S
          --key-schema AttributeName=id,KeyType=HASH
          --billing-mode PAY_PER_REQUEST &&
        aws s3 mb s3://note-attachments
      "
    depends_on:
      cloudmock:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
    depends_on:
      setup:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
