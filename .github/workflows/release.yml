name: Release
on:
  push:
    tags: ['v*']
jobs:
  build-devtools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install and build devtools
        run: cd devtools && pnpm install --frozen-lockfile && pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: devtools-dist
          path: devtools/dist/

  build-binary:
    needs: build-devtools
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - uses: actions/download-artifact@v4
        with:
          name: devtools-dist
          path: pkg/dashboard/dist/
      - name: Build binary
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CGO_ENABLED=1 go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o cloudmock-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/gateway
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cloudmock-${{ matrix.goos }}-${{ matrix.goarch }}

  build-deb:
    needs: build-binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            deb_arch: amd64
          - goarch: arm64
            deb_arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-linux-${{ matrix.goarch }}
          path: dist/
      - name: Build deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/build-deb.sh "$VERSION" "${{ matrix.deb_arch }}" "dist/cloudmock-linux-${{ matrix.goarch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: "*.deb"

  release:
    needs: [build-binary, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cloudmock-*
            dist/*.deb
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN_ARM64=$(shasum -a 256 dist/cloudmock-darwin-arm64 | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(shasum -a 256 dist/cloudmock-darwin-amd64 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(shasum -a 256 dist/cloudmock-linux-arm64 | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(shasum -a 256 dist/cloudmock-linux-amd64 | cut -d' ' -f1)

          sed -i "s/version \".*\"/version \"${VERSION}\"/" homebrew/cloudmock.rb
          # Replace SHA on the line after each platform's URL. The old
          # placeholder-based sed ("s/RELEASE_SHA256_.../...") silently
          # did nothing because the formula has real hex SHAs from the
          # previous release, not placeholder strings. Context-aware
          # sed matches the URL line and substitutes the sha256 on the
          # next line, regardless of what the current value is.
          sed -i "/cloudmock-darwin-arm64/{n;s/sha256 \".*\"/sha256 \"${SHA_DARWIN_ARM64}\"/;}" homebrew/cloudmock.rb
          sed -i "/cloudmock-darwin-amd64/{n;s/sha256 \".*\"/sha256 \"${SHA_DARWIN_AMD64}\"/;}" homebrew/cloudmock.rb
          sed -i "/cloudmock-linux-arm64/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM64}\"/;}" homebrew/cloudmock.rb
          sed -i "/cloudmock-linux-amd64/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_AMD64}\"/;}" homebrew/cloudmock.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/cloudmock.rb
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update Homebrew formula for v${VERSION}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          exit 1

  publish-npm:
    # Runs after update-homebrew so commit-back to main is serialized
    # with the homebrew bump (avoids concurrent `git push` races).
    needs: update-homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Bump npm packages to release version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          cd npm/cloudmock
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../cloudmock-rum
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Build @cloudmock/rum
        run: cd npm/cloudmock-rum && npm install && npm run build
      - name: Publish cloudmock to npm
        run: cd npm/cloudmock && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @cloudmock/rum to npm
        continue-on-error: true
        run: cd npm/cloudmock-rum && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version bumps back to main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npm/cloudmock/package.json npm/cloudmock-rum/package.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: bump npm packages to v${VERSION}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          exit 1

  publish-snap:
    # Runs after publish-npm so commit-back to main is serialized with
    # the homebrew + npm bumps (avoids concurrent `git push` races).
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump snapcraft.yaml to release version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed -i "s/^version: .*/version: '${VERSION}'/" snap/snapcraft.yaml
      - uses: snapcore/action-build@v1
        id: build
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
      - name: Commit version bump back to main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snap/snapcraft.yaml
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: bump snap version to v${VERSION}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          exit 1

  publish-docker:
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/viridian-inc/cloudmock:${{ github.ref_name }}
            ghcr.io/viridian-inc/cloudmock:latest
