name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/Viridian-Inc/cloudmock
      GONOSUMCHECK: github.com/Viridian-Inc/cloudmock
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download modules
        run: go mod download
      - name: Build, Vet, and Test
        run: |
          PKGS=$(go list ./... | grep -v templates | grep -v integration | grep -v dashboard)
          VET_PKGS=$(go list ./... | grep -v templates | grep -v integration)
          TEST_PKGS=$(go list ./... | grep -v postgres | grep -v templates | grep -v integration | grep -v dashboard)

          go build $PKGS &
          PID_BUILD=$!
          go vet $VET_PKGS &
          PID_VET=$!
          go test $TEST_PKGS -timeout 120s &
          PID_TEST=$!

          FAIL=0
          wait $PID_BUILD || FAIL=1
          wait $PID_VET   || FAIL=1
          wait $PID_TEST  || FAIL=1
          exit $FAIL

  perfgate:
    runs-on: ubuntu-latest
    needs: test
    env:
      GOPRIVATE: github.com/Viridian-Inc/cloudmock
      GONOSUMCHECK: github.com/Viridian-Inc/cloudmock
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download modules
        run: go mod download
      - name: Start CloudMock
        run: |
          CLOUDMOCK_TEST_MODE=true CLOUDMOCK_PROFILE=full go run ./cmd/gateway/ &
          sleep 5
          curl -sf http://localhost:4566/ || true
          echo "CloudMock started"
      - name: Run Performance Gate
        env:
          PERFGATE_ENDPOINT: http://localhost:4566
        run: |
          go test ./benchmarks/ -tags perfgate -timeout 120s -v 2>&1 | tee perfgate-results.txt
          echo ""
          echo "=== Performance Gate Summary ==="
          grep -E "PASS|FAIL|p50=" perfgate-results.txt | tail -30
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perfgate-results
          path: perfgate-results.txt
