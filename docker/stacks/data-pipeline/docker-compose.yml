services:
  cloudmock:
    image: ghcr.io/viridian-inc/cloudmock:latest
    ports:
      - "4566:4566"
      - "4500:4500"
    environment:
      CLOUDMOCK_PROFILE: full
      CLOUDMOCK_IAM_MODE: none
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/"]
      interval: 5s
      retries: 10

  setup:
    image: amazon/aws-cli
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws s3 mb s3://data-ingestion &&
        aws sqs create-queue --queue-name ingest &&
        aws dynamodb create-table --table-name processed-records
          --attribute-definitions AttributeName=id,AttributeType=S
          --key-schema AttributeName=id,KeyType=HASH
          --billing-mode PAY_PER_REQUEST
      "
    depends_on:
      cloudmock:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      QUEUE_URL: http://cloudmock:4566/000000000000/ingest
      DYNAMO_TABLE: processed-records
    depends_on:
      setup:
        condition: service_completed_successfully

  uploader:
    build: ./uploader
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      S3_BUCKET: data-ingestion
      QUEUE_URL: http://cloudmock:4566/000000000000/ingest
    depends_on:
      worker:
        condition: service_started
