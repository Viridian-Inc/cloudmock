name: cloudmock
base: core24
version: '1.0.4'
summary: Local AWS emulation — 98 services, one binary, built-in devtools
description: |
  CloudMock emulates 98 AWS services on your local machine. Point your AWS SDK
  at localhost:4566 and develop without a cloud account. Includes a built-in
  devtools dashboard at localhost:4500 with topology maps, request tracing,
  metrics, and chaos engineering.

  Install methods: snap, npm, Homebrew, apt, Docker.
  More info: https://cloudmock.dev

grade: stable
confinement: strict
license: Proprietary
title: CloudMock
contact: eng@viri.app
issues: https://github.com/Viridian-Inc/cloudmock/issues
source-code: https://github.com/Viridian-Inc/cloudmock
website: https://cloudmock.dev

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]

parts:
  devtools:
    plugin: nil
    source: devtools/
    build-packages:
      - nodejs
      - npm
    override-build: |
      npm install
      npm run build
      mkdir -p $SNAPCRAFT_PART_INSTALL/devtools-dist
      cp -r dist/* $SNAPCRAFT_PART_INSTALL/devtools-dist/

  cloudmock:
    after: [devtools]
    plugin: go
    source: .
    build-snaps:
      - go/1.26/stable
    build-packages:
      - gcc
      - libc6-dev
    override-build: |
      mkdir -p pkg/dashboard/dist
      cp -r $SNAPCRAFT_STAGE/devtools-dist/* pkg/dashboard/dist/ 2>/dev/null || true
      CGO_ENABLED=1 go build -ldflags="-s -w" -o $SNAPCRAFT_PART_INSTALL/bin/cloudmock ./cmd/gateway

apps:
  cloudmock:
    command: bin/cloudmock
    plugs:
      - network
      - network-bind
