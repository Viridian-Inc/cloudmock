apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
    name: securitygroups.ec2.cloudmock.io
    labels:
        app.kubernetes.io/managed-by: cloudmock-crossplane
spec:
    group: ec2.cloudmock.io
    names:
        kind: SecurityGroup
        listKind: SecurityGroupList
        plural: securitygroups
        singular: securitygroup
        shortNames:
            - sg
    scope: Cluster
    versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
                type: object
                description: A SecurityGroup is a managed resource that represents a AWS::EC2::SecurityGroup.
                properties:
                    apiVersion:
                        type: string
                    kind:
                        type: string
                    metadata:
                        type: object
                    spec:
                        type: object
                        properties:
                            deletionPolicy:
                                type: string
                                description: DeletionPolicy specifies what happens to the resource when the CR is deleted.
                                default: Delete
                            forProvider:
                                type: object
                                description: Input parameters for the resource.
                                properties:
                                    description:
                                        type: string
                                        description: The description attribute.
                                    egress:
                                        type: array
                                        description: The egress attribute.
                                        items:
                                            type: string
                                    group_name:
                                        type: string
                                        description: The group_name attribute.
                                    ingress:
                                        type: array
                                        description: The ingress attribute.
                                        items:
                                            type: string
                                    tags:
                                        type: object
                                        description: The tags attribute.
                                        additionalProperties:
                                            type: string
                                    vpc_id:
                                        type: string
                                        description: The vpc_id attribute.
                                required:
                                    - group_name
                                    - description
                            providerConfigRef:
                                type: object
                                description: Reference to the ProviderConfig.
                                properties:
                                    name:
                                        type: string
                                        description: Name of the ProviderConfig.
                                required:
                                    - name
                        required:
                            - forProvider
                    status:
                        type: object
                        properties:
                            atProvider:
                                type: object
                                description: Observed state from the external resource.
                                properties:
                                    arn:
                                        type: string
                                        description: The arn attribute.
                                    id:
                                        type: string
                                        description: The provider-assigned unique ID for this resource.
                                    security_group_id:
                                        type: string
                                        description: The security_group_id attribute.
                            conditions:
                                type: array
                                description: Conditions of the resource.
                                items:
                                    type: object
                                    x-kubernetes-preserve-unknown-fields: true
          additionalPrinterColumns:
            - name: READY
              type: string
              jsonPath: .status.conditions[?(@.type=='Ready')].status
            - name: SYNCED
              type: string
              jsonPath: .status.conditions[?(@.type=='Synced')].status
            - name: AGE
              type: date
              jsonPath: .metadata.creationTimestamp
