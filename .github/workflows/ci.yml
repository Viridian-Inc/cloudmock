name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: go build $(go list ./... | grep -v templates | grep -v integration | grep -v dashboard)
      - name: Vet
        run: go vet $(go list ./... | grep -v templates | grep -v integration)
      - name: Test
        run: go test $(go list ./... | grep -v postgres | grep -v templates | grep -v integration | grep -v dashboard) -timeout 120s
