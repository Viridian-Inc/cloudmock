name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/neureaux/cloudmock
      GONOSUMCHECK: github.com/neureaux/cloudmock
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download modules
        run: go mod download
      - name: Build, Vet, and Test
        run: |
          PKGS=$(go list ./... | grep -v templates | grep -v integration | grep -v dashboard)
          VET_PKGS=$(go list ./... | grep -v templates | grep -v integration)
          TEST_PKGS=$(go list ./... | grep -v postgres | grep -v templates | grep -v integration | grep -v dashboard)

          go build $PKGS &
          PID_BUILD=$!
          go vet $VET_PKGS &
          PID_VET=$!
          go test $TEST_PKGS -timeout 120s &
          PID_TEST=$!

          FAIL=0
          wait $PID_BUILD || FAIL=1
          wait $PID_VET   || FAIL=1
          wait $PID_TEST  || FAIL=1
          exit $FAIL
