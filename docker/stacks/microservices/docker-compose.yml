services:
  cloudmock:
    image: ghcr.io/viridian-inc/cloudmock:latest
    ports:
      - "4566:4566"
      - "4500:4500"
    environment:
      CLOUDMOCK_PROFILE: full
      CLOUDMOCK_IAM_MODE: none
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/"]
      interval: 5s
      retries: 10

  setup:
    image: amazon/aws-cli
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws dynamodb create-table --table-name orders
          --attribute-definitions AttributeName=id,AttributeType=S
          --key-schema AttributeName=id,KeyType=HASH
          --billing-mode PAY_PER_REQUEST &&
        aws dynamodb create-table --table-name payments
          --attribute-definitions AttributeName=orderId,AttributeType=S
          --key-schema AttributeName=orderId,KeyType=HASH
          --billing-mode PAY_PER_REQUEST &&
        aws sns create-topic --name orders &&
        aws sqs create-queue --queue-name payments &&
        aws sqs create-queue --queue-name notifications &&
        TOPIC_ARN=$$(aws sns list-topics --query 'Topics[0].TopicArn' --output text) &&
        PAYMENTS_URL=$$(aws sqs get-queue-url --queue-name payments --query QueueUrl --output text) &&
        NOTIF_URL=$$(aws sqs get-queue-url --queue-name notifications --query QueueUrl --output text) &&
        aws sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint $$PAYMENTS_URL &&
        aws sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint $$NOTIF_URL
      "
    depends_on:
      cloudmock:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "3001:3001"
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      ORDERS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:orders
    depends_on:
      setup:
        condition: service_completed_successfully

  payment-service:
    build: ./payment-service
    ports:
      - "3002:3002"
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      PAYMENTS_QUEUE_URL: http://cloudmock:4566/000000000000/payments
    depends_on:
      setup:
        condition: service_completed_successfully

  notification-service:
    build: ./notification-service
    ports:
      - "3003:3003"
    environment:
      AWS_ENDPOINT_URL: http://cloudmock:4566
      NOTIFICATIONS_QUEUE_URL: http://cloudmock:4566/000000000000/notifications
    depends_on:
      setup:
        condition: service_completed_successfully
