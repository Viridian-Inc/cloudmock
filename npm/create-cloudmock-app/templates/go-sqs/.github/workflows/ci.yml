name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: viridian-inc/cloudmock-action@v1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - run: go mod tidy

      - run: go test ./...
