app = "cloudmock-saas"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  CLOUDMOCK_SAAS_ENABLED = "true"
  CLOUDMOCK_AUTH_ENABLED = "true"
  CLOUDMOCK_PROFILE = "full"

[http_service]
  internal_port = 4500
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2

[[services]]
  internal_port = 4566
  protocol = "tcp"
  [services.concurrency]
    type = "connections"
    hard_limit = 100

[restart]
  policy = "always"
  max_retries = 5

[checks]
  [checks.health]
    type = "http"
    port = 4500
    path = "/api/health"
    interval = "10s"
    timeout = "5s"
    grace_period = "15s"
    restart_limit = 3
