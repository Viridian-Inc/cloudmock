name: cloudmock tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      cloudmock:
        image: ghcr.io/neureaux/cloudmock:latest
        ports:
          - 4566:4566

    steps:
      - uses: actions/checkout@v4

      - name: Wait for cloudmock
        run: cloudmock-ci wait --timeout 30s

      - name: Run tests
        run: cloudmock-ci run --tool terraform

      - name: Generate report
        if: always()
        run: cloudmock-ci report --format junit --output results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
